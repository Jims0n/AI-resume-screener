{% extends "base.html" %}
{% block content %}
<h1 style="margin:0 0 20px;font-size:24px;font-weight:700;color:#e8e4d9;">{{ email_subject }}</h1>

<div style="color:#8a8578;line-height:1.7;font-size:15px;">
    {{ email_body|safe }}
</div>

{% if greeting_tag or closing_tag %}
<p style="margin:24px 0 0;color:#8a8578;line-height:1.6;">
    {% if greeting_tag %}<span style="display:block;">{{ greeting_tag }}</span>{% endif %}
    {% if closing_tag %}<span style="display:block;font-weight:600;color:#e8e4d9;">{{ closing_tag }}</span>{% endif %}
</p>
{% endif %}
{% endblock %}
