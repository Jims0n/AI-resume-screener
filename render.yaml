# render.yaml — Render Blueprint (Infrastructure-as-Code)
# Docs: https://docs.render.com/blueprint-spec

services:
  - type: web
    name: shortlyst-api
    runtime: python
    region: frankfurt  # eu-central — closest to you
    plan: free
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        sync: false  # set manually in Render dashboard
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random key
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false  # set to your-app.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # set to your frontend production URL
      - key: ANTHROPIC_API_KEY
        sync: false  # set manually in Render dashboard
      - key: ANTHROPIC_MODEL
        value: "claude-3-haiku-20240307"
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "True"
      - key: SECURE_SSL_REDIRECT
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.11"
